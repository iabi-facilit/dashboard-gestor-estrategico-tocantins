<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Unidade Gestor Estratégico — Plano de Trabalho</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100vh; width: 100vw;
  overflow: hidden;
  background: #f0f4fa;
  font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
  color: #252423;
  display: flex;
  flex-direction: column;
}

/* ════ TOPO — altura FIXA 124px ════ */
.top {
  flex-shrink: 0;
  display: flex;
  background: #fff;
  border-bottom: 2px solid #044CB8;
  padding: 10px 16px;
  gap: 12px;
  align-items: stretch;
}

.filters {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 7px;
}
.filters__logo img { height: 38px; }
.frow { display: flex; gap: 8px; align-items: flex-end; }
.fitem { display: flex; flex-direction: column; gap: 2px; }
.fitem label {
  font-size: .6rem; font-weight: 700; color: #044CB8;
  text-transform: uppercase; letter-spacing: .06em; white-space: nowrap;
}
.fitem select, .fitem input[type="date"] {
  height: 26px; border: 1.5px solid #b0c4e0; border-radius: 3px;
  padding: 0 6px; font-size: .73rem; color: #333; background: #fff;
  outline: none; cursor: pointer; width: 100%;
}
.fitem select:focus, .fitem input:focus { border-color: #044CB8; }
.fi-date { width: 116px; flex-shrink: 0; }
.fi-sm   { width: 126px; flex-shrink: 0; }
.fi-md   { flex: 1; min-width: 110px; }

.btn {
  height: 26px; padding: 0 14px; border-radius: 3px;
  font-size: .72rem; font-weight: 700; cursor: pointer;
  white-space: nowrap; flex-shrink: 0; align-self: flex-end; border: none;
}
.btn-p { background: #044CB8; color: #fff; }
.btn-p:hover { background: #033a8a; }
.btn-o { background: #fff; color: #044CB8; border: 1.5px solid #044CB8; }
.btn-o:hover { background: #e8f0fb; }

/* KPI cards */
.kpis {
  flex-shrink: 0; display: flex; gap: 10px; align-items: stretch;
  border-left: 1px solid #dde8f5; padding-left: 12px;
}
.kpi {
  width: 174px; display: flex; flex-direction: column;
  border-radius: 5px 5px 3px 3px; overflow: hidden;
  box-shadow: 0 2px 8px rgba(4,76,184,.13);
}
.kpi__head {
  background: #044CB8; color: #fff;
  font-size: .7rem; font-weight: 700; text-align: center;
  padding: 6px 4px; line-height: 1.2; flex-shrink: 0;
}
.kpi__body {
  flex: 1; background: #fff;
  border: 1.5px solid #d0dcf0; border-top: none; border-radius: 0 0 3px 3px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 10px;
}
.kpi__body img { width: 34px; height: 34px; opacity: .85; }
.kpi__val { font-size: 2.2rem; font-weight: 700; color: #044CB8; line-height: 1; }

/* ════ BARRA AZUL — altura FIXA 44px ════ */
.bar {
  height: 44px; flex-shrink: 0;
  background: #044CB8;
  display: flex; align-items: center;
  padding: 0 16px; gap: 10px; overflow: hidden;
}
.bar__lbl { color: #fff; font-size: .64rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
.bar__sep { width: 1px; height: 22px; background: rgba(255,255,255,.3); }
.bar select {
  height: 24px; background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.4); border-radius: 3px;
  color: #fff; font-size: .72rem; padding: 0 7px; outline: none; cursor: pointer;
  min-width: 108px;
}
.bar select option { background: #044CB8; }
.bar__btns { margin-left: auto; display: flex; gap: 7px; }
.bar__btn {
  height: 26px; padding: 0 14px; border-radius: 3px;
  font-size: .72rem; font-weight: 700; cursor: pointer; border: none;
}
.bar__btn--w { background: #fff; color: #044CB8; }
.bar__btn--w:hover { background: #e8f0fb; }
.bar__btn--g { background: transparent; border: 1.5px solid rgba(255,255,255,.5); color: #fff; }
.bar__btn--g:hover { background: rgba(255,255,255,.1); }

/* ════ GRÁFICOS — ocupa o restante EXATO ════ */
.charts {
  height: 100px; /* valor inicial; JS recalcula em layoutCharts() */
  display: flex; gap: 12px; padding: 12px 14px;
  background: #f0f4fa; overflow: hidden;
}

.panel {
  background: #fff; border: 1px solid #dce6f5;
  border-radius: 8px; box-shadow: 0 1px 5px rgba(4,76,184,.07);
  display: flex; flex-direction: column;
  overflow: hidden;           /* ← impede overflow do canvas */
}
.panel--bar   { flex: 0 0 46%; }
.panel--donut { flex: 1; }

.panel__head {
  flex-shrink: 0; padding: 8px 12px 7px;
  border-bottom: 2px solid #044CB8;
  display: flex; align-items: center; justify-content: space-between;
}
.panel__head h2 { font-size: .82rem; font-weight: 700; color: #044CB8; }
.panel__head .ic-btn {
  background: transparent; border: none; cursor: pointer;
  opacity: .5; padding: 0; display: flex; align-items: center;
}
.panel__head .ic-btn:hover { opacity: 1; }
.panel__head .ic-btn img { width: 17px; height: 17px; }

/* ── canvas wrapper — ocupa o espaço restante do panel ── */
.chart-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
}
/* canvas preenche o wrapper via inset — sem !important que bloqueia Chart.js */
.chart-wrap canvas {
  position: absolute;
  inset: 0;
}

/* ── Donut: área interna ── */
.donut-inner {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 6px 12px 8px; gap: 0;
  overflow: hidden;
}
.donut-row {
  flex: 1; min-height: 0;
  display: flex; gap: 8px; align-items: stretch; /* stretch para donut-wrap ter altura */
  overflow: hidden;
}
.donut-wrap {
  flex: 1; min-height: 0;
  position: relative; overflow: hidden;
}
.donut-wrap canvas {
  position: absolute;
  inset: 0;
}
.donut-badge {
  flex-shrink: 0; width: 100px;
  align-self: center; /* badge fica centralizado verticalmente */
  background: #fff; border: 2px solid #044CB8; border-radius: 8px;
  padding: 9px 6px; text-align: center;
  box-shadow: 0 2px 8px rgba(4,76,184,.13);
}
.donut-badge__lbl {
  font-size: .56rem; font-weight: 700; color: #044CB8;
  text-transform: uppercase; letter-spacing: .06em; line-height: 1.3;
}
.donut-badge__val { font-size: 1.8rem; font-weight: 700; color: #044CB8; line-height: 1.1; }

/* legenda */
.legend {
  flex-shrink: 0;
  display: flex; flex-wrap: wrap; gap: 2px 12px;
  border-top: 1px solid #eaeef6; padding-top: 5px; margin-top: 4px;
  overflow: hidden;
}
.li { display: flex; align-items: center; gap: 4px; font-size: .62rem; color: #444; white-space: nowrap; }
.ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.lp { color: #aaa; }
</style>
</head>

<div class="bar">
  <span class="bar__lbl">Status:</span>
  <select onchange="syncSel('f-status',this.value)">
    <option value="">Todos</option><option>A INICIAR</option><option>EM ANDAMENTO</option>
    <option>EM ATRASO</option><option>CONCLUÍDO</option><option>PARALISADO</option><option>ATRASADO</option>
  </select>
  <div class="bar__sep"></div>
  <span class="bar__lbl">Situação:</span>
  <select onchange="syncSel('f-sit',this.value)">
    <option value="">Todas</option><option>Dentro do Prazo</option><option>Fora do Prazo</option>
  </select>
  <div class="bar__btns">
    <button class="bar__btn bar__btn--g" onclick="clearFilters()">Limpar</button>
    <button class="bar__btn bar__btn--w" onclick="applyFilters()">Aplicar</button>
  </div>
</div>

<!-- ══ GRÁFICOS ══ -->
<div class="charts">

  <!-- Barras -->
  <div class="panel panel--bar">
    <div class="panel__head"><h2>Órgãos</h2></div>
    <div class="chart-wrap" style="padding:6px 10px 6px 6px;">
      <canvas id="cBar"></canvas>
    </div>
  </div>

  <!-- Donut -->
  <div class="panel panel--donut">
    <div class="panel__head">
      <h2>Planos de Trabalho</h2>
      <button class="ic-btn" title="Detalhes"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAvmHAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAACxIAAAsSAdLdfvwAAAEVSURBVGhD7ZZBDoIwEEXxHuolFI5kYOEx9CIuSjwB6rFcKCucmknT1mlNGgkl/pfMZv78ZFoC/AIAAMDP2ezO67Jpr1Wj+qppB7dUX9btZduoFY/nBy15+1zcLX0IHs8P+ea9qtWTx/PDXpRbhpiWDbElQ1pZqyO9Nw9b90vrVAe2vEn1RbHN3DLI2rCgRe62Fio9xyYi1fcF28gtQ0jTN5Ryk6m+KLN/iem09A8QlnZKdTyeH/onpb/z8pPQPdVV+9OSxwHwQRaaGvnmvUIWGpHYkiEtNdOk+qLYZm4ZZA1ZCFnIgU6LLAT+GmShqZFv3itkoRGJLRnSUjNNqi+KbeaWQdaQhZCFHOi0yEIAAABmQFG8AP505gjX/dP7AAAAAElFTkSuQmCC" alt=""></button>
    </div>
    <div class="donut-inner">
      <div class="donut-row">
        <div class="donut-wrap"><canvas id="cDonut"></canvas></div>
        <div class="donut-badge">
          <div class="donut-badge__lbl">Total de<br>Planos</div>
          <div class="donut-badge__val" id="kv-tot">—</div>
        </div>
      </div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

</div>

<script>
const SC = {
  'A INICIAR':'#999','EM ANDAMENTO':'#2292B7','EM ATRASO':'#F8C200',
  'EM ESTUDO':'#874B4B','CONCLUÍDO':'#1EAA59','PARALISADO':'#D01B1E',
  'ATRASADO':'#E84C3D','NÃO PLANEJADO':'#964A00'
};
const orgaos = {
  labels:['SEFAZ','SEDU','SES','SEINF','SEAGRO','SECOM','SEJUV','SEPLAN','SEDER','SECAD','SEMUS','AGE','SEGOV','SECCI','SETP'],
  values:[18,15,14,12,11,10,9,8,8,7,7,6,6,5,4]
};
const sd = {'EM ANDAMENTO':52,'A INICIAR':28,'CONCLUÍDO':24,'EM ATRASO':18,'ATRASADO':10,'PARALISADO':5,'EM ESTUDO':3,'NÃO PLANEJADO':2};
const sL=Object.keys(sd), sV=Object.values(sd), sC=sL.map(k=>SC[k]);
const tot=sV.reduce((a,b)=>a+b,0);
document.getElementById('kv-tot').textContent=tot;

// Legenda (sem precisar de layout)
const lg=document.getElementById('legend');
sL.forEach((l,i)=>{
  const p=Math.round(sV[i]/tot*100);
  lg.innerHTML+=`<div class="li"><div class="ld" style="background:${sC[i]}"></div><span><b>${l}</b> — ${sV[i]} <span class="lp">(${p}%)</span></span></div>`;
});

// Ajusta altura dos gráficos ao espaço real disponível
function layoutCharts() {
  const topH = document.querySelector('.top').offsetHeight;
  const barH = document.querySelector('.bar').offsetHeight;
  document.querySelector('.charts').style.height = (window.innerHeight - topH - barH) + 'px';
}
layoutCharts();
window.addEventListener('resize', () => { layoutCharts(); });

// Adia inicialização dos charts para depois do layout estar computado
requestAnimationFrame(() => requestAnimationFrame(() => {

  new Chart(document.getElementById('cBar'),{
    type:'bar',
    data:{labels:orgaos.labels,datasets:[{data:orgaos.values,backgroundColor:'#044CB8bb',borderColor:'#044CB8',borderWidth:1,borderRadius:3}]},
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      layout:{padding:0},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.x} planos`}}},
      scales:{
        x:{grid:{color:'#e8f0fb'},ticks:{color:'#044CB8',font:{size:10}}},
        y:{grid:{display:false},ticks:{color:'#044CB8',font:{size:10,weight:'bold'}}}
      }
    }
  });

  new Chart(document.getElementById('cDonut'),{
    type:'doughnut',
    data:{labels:sL,datasets:[{data:sV,backgroundColor:sC,borderWidth:2,borderColor:'#fff',hoverOffset:6}]},
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'60%',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>` ${c.label}: ${c.parsed} (${(c.parsed/tot*100).toFixed(1)}%)`}}
      }
    },
    plugins:[{id:'ct',afterDraw(ch){
      const {ctx,chartArea:{top,bottom,left,right}}=ch;
      const cx=(left+right)/2, cy=(top+bottom)/2;
      ctx.save();
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#044CB8'; ctx.font='bold 26px Segoe UI,Arial';
      ctx.fillText(tot,cx,cy-8);
      ctx.font='10px Segoe UI,Arial'; ctx.fillStyle='#999';
      ctx.fillText('planos',cx,cy+12);
      ctx.restore();
    }}]
  });

}));

function syncSel(id,v){document.getElementById(id).value=v;}
function applyFilters(){}
function clearFilters(){
  document.querySelectorAll('select').forEach(s=>s.selectedIndex=0);
  document.querySelectorAll('input[type=date]').forEach(i=>i.value='');
}
</script>
</body>
